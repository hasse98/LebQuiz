<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libanesisk Arabiska Quiz</title>
  <meta name="description" content="Testa din libanesiska arabiska! 15 nya ord varje dag klockan 08:00.">
  <meta property="og:title" content="Libanesisk Arabiska Quiz">
  <meta property="og:description" content="Testa din libanesiska! 15 nya ord varje dag.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇱🇧</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Libanesisk Arabiska</h1>
  <p id="dailyLabel">Daglig quiz · laddar...</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="quiz-container">
  <div class="score-display">
    <span>Fråga <b id="qNum">1</b> av 15</span>
    <span>Poäng: <b id="scoreNum">0</b></span>
  </div>

  <div id="quizArea"></div>

  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🌲</div>
    <h2 id="resultTitle">Quiz klart!</h2>
    <div class="final-score" id="finalScore">0 / 15</div>
    <p id="resultMsg"></p>

    <div class="result-actions">
      <button class="restart-btn" onclick="restartQuiz()">Försök igen</button>
      <button class="share-btn" onclick="openShareModal()">Dela resultat 📤</button>
    </div>

    <div class="countdown-wrap" id="countdownWrap">
      <p class="countdown-label">Nästa quiz om</p>
      <div class="countdown" id="countdown">--:--:--</div>
    </div>

    <div class="answer-sheet" id="answerSheet">
      <h3>Facit</h3>
      <div id="answerRows"></div>
    </div>
  </div>
</div>

<!-- Share Modal -->
<div class="share-overlay" id="shareModal" onclick="closeShareModalOutside(event)">
  <div class="share-modal">
    <button class="share-close" onclick="closeShareModal()">×</button>
    <h3>Dela ditt resultat</h3>
    <pre class="share-preview" id="sharePreview"></pre>
    <div class="share-btns">
      <button class="share-action-btn copy-btn" onclick="copyToClipboard()">
        📋 Kopiera text
      </button>
      <button class="share-action-btn whatsapp-btn" onclick="shareWhatsApp()">
        💬 WhatsApp
      </button>
      <button class="share-action-btn twitter-btn" onclick="shareTwitter()">
        𝕏 Twitter / X
      </button>
      <button class="share-action-btn native-btn" id="nativeShareBtn" onclick="shareNative()">
        📤 Dela via...
      </button>
    </div>
    <div class="copy-confirm" id="copyConfirm">Kopierat! ✓</div>
  </div>
</div>

<script src="questions.js"></script>
<script src="quiz.js"></script>
</body>
</html>
